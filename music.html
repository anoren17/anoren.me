  <script>
    // Every shared link from the original site, in order.
    // a = Amazon Music [asin, id, height]; y = YouTube [videoId, title];
    // n = note [date, text]; h = heading; l = link [url, label, videoId]
    const items = [
      ['a', 'B01N6J9HCO', '7gZBEe5QaF', 352],
      ['y', 'oRZ0cfZ9SeU', 'Vilen — Ek Raat'],
      ['a', 'B094MQK737', '5H4tipmXvo', 390],
      ['a', 'B07X83TF2P', 'GInRR19YJd', 390],
      ['a', 'B0B7B1RRLM', 'AIKngnm9yP', 390],
      ['a', 'B074QFMHBY', 'XdwDycClsy', 390],
      ['a', 'B09V6DP45M', 'WjG2QlesYQ', 390],
      ['a', 'B000WLMMBW', '3qctVWmDTv', 390],
      ['a', 'B002EHTTHW', 'gTva9E4JBY', 390],

      ['a', 'B002A5ZD96', 'Fop6qulavJ', 390],
      ['a', 'B001NZXFFI', 'AvF3BH4tT6', 390],
      ['n', '5/17', ''],
      ['a', 'B0B5LBDK7R', 'DhWzxtrLec', 390],
      ['n', '2/22', ''],
      ['a', 'B096LFPB89', '9V4ho6MjHO', 390],
      ['n', '1/29', ''],
      ['a', 'B0BKYYFCFR', 'JfX392Yvp5', 390],
      ['n', '1/27', ''],
      ['a', 'B01MSIOX2M', 'feVjg394T3', 390],
      ['n', '1/11', 'Gonna be on repeat next few days'],
      ['y', 'vSINZsLxs8k', 'Sickick — Infected'],
      ['a', 'B0791J764L', 'nQDwW3ERzG', 390],
      ['a', 'B0BHTGLFBQ', '2pQTjCVt5G', 390],
      ['n', '11/26', 'On repeat today ¯\\_(ツ)_/¯. One hell of a day, full of stress and high levels of cortisol.'],
      ['a', 'B0758XZ5XG', '0znkbFgYTB', 390],
      ['a', 'B09NLD8Q9D', 'NEfjMIgSSC', 390],
      ['a', 'B095F7BRBJ', 'ggMoFuL6Hm', 390],
      ['n', '', "But blood's not thicker than water after all"],
      ['a', 'B01BM5MW2K', 'BlzTWR3Vku', 600],
      ['a', 'B09SJSVZS7', 'CWWuS0lmwm', 600],
      ['n', '10/22', 'Respiration is my top repeat song these days.'],
      ['h', 'Evolution of <em>Petrunko</em>'],
      ['y', 'Skhaf0yQrQc', 'The Great Voices of Bulgaria — Bre Petrunko'],
      ['y', 'dD4oeEvL_sw', 'Petrunko Remix by FanEOne (Bass Boosted)'],
      ['y', 'vS3KVq_xjMo', 'Petrunko Remix by FanEOne — Rolls Royce'],
      ['y', '0HL-N9oOjcs', 'Evolution of Petrunko (English version)'],
      ['y', 'pF1pKFiGXYw', "t.A.T.u. — Ne Ver', Ne Boysya, Ne Prosi"],
      ['n', '10/8', 'On repeat'],
      ['y', 'YLHpvjrFpe0', 'Linkin Park — From the Inside'],
      ['n', '10/18', ''],
      ['y', 'Z0z9BawyNLQ', 'Dido — White Flag'],
      ['n', '10/19', '']
    ];

    const feed = document.getElementById('feed');
    const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    items.forEach(it => {
      const el = document.createElement('div');
      const type = it[0];

      if (type === 'a') {
        const [, asin, id, h] = it;
        el.className = 'feed-item';
        el.innerHTML =
          '<span class="f-label">Amazon Music</span>' +
          '<div class="f-embed"><iframe loading="lazy" height="' + h + '" ' +
          'src="https://music.amazon.com/embed/' + asin +
          '/?id=' + id + '&marketplaceId=ATVPDKIKX0DER&musicTerritory=US"></iframe></div>';
      } else if (type === 'y') {
        const [, vid, title] = it;
        el.className = 'feed-item';
        el.innerHTML =
          '<span class="f-label">YouTube · ' + esc(title) + '</span>' +
          '<div class="f-embed f-yt"><iframe loading="lazy" src="https://www.youtube.com/embed/' + vid +
          '" title="' + esc(title) + '" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>';
      } else if (type === 'n') {
        const [, date, text] = it;
        el.className = 'feed-item f-note';
        el.innerHTML =
          (date ? '<span class="d">' + esc(date) + '</span>' : '') +
          (text ? '<div class="t">' + esc(text) + '</div>' : '');
      } else if (type === 'h') {
        el.className = 'f-heading';
        el.innerHTML = it[1];
      }
      feed.appendChild(el);
    });
  </script>
